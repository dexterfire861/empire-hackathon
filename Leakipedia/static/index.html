<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakipedia — Digital Exposure Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 760px; margin: 0 auto; padding: 24px; }
    h1 {
      font-size: 28px;
      color: #00ff88;
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .header-copy { flex: 1; }
    .install-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .install-btn:hover {
      border-color: #00ff88;
      color: #00ff88;
    }
    .intro-card {
      background: #101018;
      border: 1px solid #1a1a2e;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
      color: #9aa0b5;
      line-height: 1.6;
      font-size: 13px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-grid.full { grid-template-columns: 1fr; }
    label {
      display: block;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #141420;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #00ff88; }
    input::placeholder { color: #444; }
    button#scanBtn {
      width: 100%;
      padding: 12px;
      background: #00ff88;
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    button#scanBtn:hover { background: #00cc6a; }
    button#scanBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .form-note {
      margin-top: 12px;
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #5c2222;
      background: #1a1010;
      color: #ff8f8f;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <div class="header-copy">
        <h1>LEAKIPEDIA</h1>
        <p class="subtitle">Digital Exposure Scanner — Empire Hacks 2026</p>
      </div>
      <a class="install-btn" href="/extension/install">Install Leak Prevent</a>
    </div>

    <div class="intro-card">
      Enter a few identifiers and Leakipedia will start a scan, then open a dedicated results page for the live trace and final report.
    </div>

    <div class="form-grid">
      <div>
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="Aryaan Verma">
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="email" placeholder="verma.aryaan@gmail.com">
      </div>
    </div>
    <div class="form-grid">
      <div>
        <label>Username</label>
        <input type="text" id="username" placeholder="dexterfire861">
      </div>
      <div>
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="+14155552671">
      </div>
    </div>
    <div class="form-grid full">
      <div>
        <label>Location (for privacy law routing)</label>
        <input type="text" id="location" placeholder="New York">
      </div>
    </div>

    <button id="scanBtn" onclick="startScan()">SCAN FOR EXPOSURE</button>
    <div class="form-note">You'll be redirected to a separate results page as soon as the scan starts.</div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <script>
    function showError(message) {
      var errorBox = document.getElementById('errorBox');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    async function startScan() {
      var fullName = document.getElementById('fullName').value.trim();
      var email = document.getElementById('email').value.trim();
      var username = document.getElementById('username').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var location = document.getElementById('location').value.trim();

      if (!fullName) { alert('Full name is required'); return; }
      if (!email && !username && !phone) { alert('At least one of email, username, or phone is required'); return; }

      var btn = document.getElementById('scanBtn');
      var errorBox = document.getElementById('errorBox');
      btn.disabled = true;
      btn.textContent = 'STARTING...';
      errorBox.style.display = 'none';

      var body = { full_name: fullName };
      if (email) body.email = email;
      if (username) body.username = username;
      if (phone) body.phone = phone;
      if (location) body.location = location;

      try {
        var resp = await fetch('/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        var data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.detail || data.message || 'Unable to start scan');
        }
        if (!data.scan_id) {
          throw new Error('No scan ID returned');
        }

        window.location.href = '/results?scan_id=' + encodeURIComponent(data.scan_id);
      } catch (err) {
        showError(err.message || 'Unable to start scan');
        btn.disabled = false;
        btn.textContent = 'SCAN FOR EXPOSURE';
      }
    }
  </script>
</body>
</html>
